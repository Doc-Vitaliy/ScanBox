<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan Terminal</title>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #111;
      --primary-inv: #fff;
      --bg: #f4f4f2;
      --surface: #ffffff;
      --surface-2: #f7f7f5;
      --border: rgba(0,0,0,0.1);
      --border-md: rgba(0,0,0,0.18);
      --text: #111;
      --text-2: #555;
      --text-3: #999;
      --radius: 10px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --blue-bg: #e8f0fe; --blue-text: #1a56db;
      --green-bg: #e3f5ec; --green-text: #1a7a45;
      --red-bg: #feecec; --red-text: #c0392b;
      --yellow-bg: #fef9e7; --yellow-text: #9a6000;
      --purple-bg: #f4e8fe; --purple-text: #6b1adb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --primary: #f0f0ee;
        --primary-inv: #111;
        --bg: #111;
        --surface: #1c1c1a;
        --surface-2: #242422;
        --border: rgba(255,255,255,0.1);
        --border-md: rgba(255,255,255,0.18);
        --text: #f0f0ee;
        --text-2: #aaa;
        --text-3: #666;
        --blue-bg: #1a2a4a; --blue-text: #7aadff;
        --green-bg: #0e2a1a; --green-text: #5ecc8a;
        --red-bg: #2a0e0e; --red-text: #ff7a7a;
        --yellow-bg: #2a1e00; --yellow-text: #ffc84a;
        --purple-bg: #2a1a4a; --purple-text: #b37aff;
      }
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    /* ─── Card ─────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-xl);
      width: 100%;
      max-width: 440px;
      overflow: hidden;
    }

    /* ─── Header ────────────────────────────────────────── */
    .card-header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 0.5px solid var(--border);
    }

    .logo { display: flex; align-items: center; gap: 10px; }

    .logo-icon {
      width: 34px; height: 34px;
      background: var(--primary);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { stroke: var(--primary-inv); width: 16px; height: 16px; }

    .logo-text {
      font-size: 13px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text);
    }
    .logo-sub { font-size: 11px; color: var(--text-3); letter-spacing: 0.04em; }

    /* ─── Printer button & panel ────────────────────────── */
    .print-wrap { position: relative; }

    .printer-btn {
      width: 34px; height: 34px;
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius);
      background: var(--surface-2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .printer-btn:hover { background: var(--bg); }
    .printer-btn svg { width: 16px; height: 16px; stroke: var(--text-2); }

    .print-panel {
      display: none;
      position: absolute;
      top: calc(100% + 8px); right: 0;
      background: var(--surface);
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-lg);
      padding: 16px;
      width: 200px;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .print-panel.open { display: block; }

    .panel-title {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 12px;
    }

    /* ─── Form controls ─────────────────────────────────── */
    .field {
      width: 100%;
      padding: 10px 12px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-2);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 8px;
    }
    .field:focus { border-color: var(--border-md); background: var(--surface); }
    .field:disabled { opacity: 0.6; cursor: not-allowed; }
    .field::placeholder { color: var(--text-3); }

    /* ─── Login area ────────────────────────────────────── */
    .login-area { padding: 28px 24px 24px; }

    .section-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 14px;
    }

    .login-status {
      font-size: 13px;
      color: var(--red-text);
      text-align: center;
      margin-top: 10px;
      min-height: 18px;
    }

    .link-tiny {
      font-size: 11px;
      color: var(--text-3);
      text-align: center;
      margin-top: 14px;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ─── User bar ──────────────────────────────────────── */
    .user-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px;
      background: var(--surface-2);
      border-bottom: 0.5px solid var(--border);
    }

    .user-name {
      display: flex; align-items: center; gap: 9px;
      font-size: 13px; font-weight: 500;
      color: var(--text);
    }

    .user-avatar {
      width: 26px; height: 26px;
      background: var(--primary);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600;
      color: var(--primary-inv);
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    .logout-btn {
      font-size: 11px; font-weight: 500;
      padding: 4px 10px;
      border: 0.5px solid var(--border-md);
      border-radius: 6px;
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      font-family: 'IBM Plex Sans', sans-serif;
      letter-spacing: 0.04em;
      transition: background 0.12s;
    }
    .logout-btn:hover { background: var(--bg); }

    /* ─── Main area ─────────────────────────────────────── */
    .main-area { padding: 20px 24px 24px; }

    /* ─── Mode selector ─────────────────────────────────── */
    .mode-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 3px;
      background: var(--surface-2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 3px;
      margin-bottom: 16px;
    }

    .mode-btn {
      padding: 8px 4px;
      border: none;
      border-radius: 7px;
      background: transparent;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.15s;
    }
    .mode-btn.active {
      background: var(--surface);
      color: var(--text);
      border: 0.5px solid var(--border);
    }

    /* ─── Scan input ────────────────────────────────────── */
    .scan-input-wrap { position: relative; margin-bottom: 14px; }
    .scan-input-wrap .icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      width: 15px; height: 15px;
      stroke: var(--text-3);
      pointer-events: none;
    }

    .scan-input {
      width: 100%;
      padding: 11px 12px 11px 36px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-2);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .scan-input:focus { border-color: var(--border-md); background: var(--surface); }
    .scan-input::placeholder { font-family: 'IBM Plex Sans', sans-serif; color: var(--text-3); }

    /* ─── Error box ─────────────────────────────────────── */
    .error-box {
      display: none;
      padding: 10px 14px;
      background: var(--red-bg);
      border: 0.5px solid rgba(192,57,43,0.25);
      border-radius: var(--radius);
      color: var(--red-text);
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 12px;
    }
	

    /* ─── Status line ───────────────────────────────────── */
    .status-line {
      font-size: 13px; font-weight: 500;
      text-align: center;
      min-height: 20px;
      margin-bottom: 8px;
    }

    /* ─── Scan list ─────────────────────────────────────── */
    .scan-list {
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      max-height: 280px;
      overflow-y: auto;
      margin-bottom: 14px;
    }
    .scan-list:empty { display: none; }

    .scan-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-bottom: 0.5px solid var(--border);
      background: var(--surface);
      transition: background 0.1s;
    }
    .scan-item:last-child { border-bottom: none; }
    .scan-item.dup { background: var(--red-bg); }

    .scan-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text-3);
      min-width: 22px;
      text-align: right;
      flex-shrink: 0;
    }
	.finish-single-btn {
      width: 22px; height: 22px;
      border: none; background: transparent;
      color: var(--green-text);
      cursor: pointer;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s;
      flex-shrink: 0;
    }
    .finish-single-btn:hover { background: var(--green-bg); }
    .finish-single-btn svg { width: 14px; height: 14px; stroke: var(--green-text); }

    .scan-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px; font-weight: 600;
      color: var(--text);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .scan-tag {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 5px;
      flex-shrink: 0;
    }
    .tag-box  { background: var(--blue-bg);   color: var(--blue-text); }
    .tag-ttn  { background: var(--green-bg);  color: var(--green-text); }
    .tag-dup  { background: var(--red-bg);    color: var(--red-text); }
    .tag-route{ background: var(--purple-bg); color: var(--purple-text); }

    .del-btn {
      width: 22px; height: 22px;
      border: none; background: none;
      color: var(--text-3);
      cursor: pointer;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 300;
      transition: color 0.1s, background 0.1s;
      flex-shrink: 0;
    }
    .del-btn:hover { color: var(--red-text); background: var(--red-bg); }

    /* ─── Process button ────────────────────────────────── */
    .process-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: var(--radius);
      background: var(--primary);
      color: var(--primary-inv);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .process-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .process-btn:not(:disabled):hover { opacity: 0.82; }

    /* ─── Route specific buttons ────────────────────────── */
    .btn-outline {
      background: var(--surface-2);
      color: var(--text);
      border: 0.5px solid var(--border-md);
      margin-bottom: 8px;
    }
    .btn-finish {
      background: #27ae60;
    }
    .btn-finish:not(:disabled):hover { opacity: 0.9; }

    /* ─── Helpers ───────────────────────────────────────── */
    .hidden { display: none !important; }
    .divider { height: 0.5px; background: var(--border); margin: 18px 0; }
  </style>
</head>
<body>

<div class="card">

  <div class="card-header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">Scan Terminal</div>
        <div class="logo-sub">Складська система</div>
      </div>
    </div>

    <div class="print-wrap" id="printWrap">
      <button class="printer-btn" onclick="togglePrint()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 6 2 18 2 18 9"/>
          <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
      </button>
      <div class="print-panel" id="printPanel">
        <div class="panel-title">Генератор штрихкодів</div>
        <input class="field" type="number" id="printFrom" placeholder="З номера">
        <input class="field" type="number" id="printTo" placeholder="По номер">
        <button class="process-btn" onclick="generateAndPrintBatch()" style="font-size:12px;padding:9px;">Друк</button>
        <div style="text-align:center;margin-top:10px;">
          <span class="link-tiny" onclick="togglePrint()">Закрити</span>
        </div>
      </div>
    </div>
  </div>

  <div class="login-area" id="loginArea">
    <div class="section-label">Авторизація</div>
    <input class="field" type="text"     id="usernameInput" placeholder="Логін"  autocomplete="username">
    <input class="field" type="password" id="passwordInput" placeholder="Пароль" autocomplete="current-password">
    <button class="process-btn" onclick="login()">Увійти</button>
    <div class="login-status" id="loginStatus"></div>
    <div class="link-tiny" onclick="resetApiUrl()">Налаштувати API URL</div>
  </div>

  <div id="mainArea" class="hidden">

    <div class="user-bar">
      <div class="user-name">
        <div class="user-avatar" id="userAvatar">??</div>
        <span id="userLabel"></span>
      </div>
      <button class="logout-btn" onclick="location.reload()">Вийти</button>
    </div>

    <div class="main-area">

      <div class="mode-row">
        <button id="modeOutbound" class="mode-btn active" onclick="setMode('Відправка')">Відправка</button>
        <button id="modeInbound"  class="mode-btn"        onclick="setMode('Отримання')">Отримання</button>
        <button id="modeRoute"    class="mode-btn"        onclick="setMode('Маршрути')">Погрузка</button>
      </div>

      <div class="error-box" id="errorDisplay"></div>
      <div class="status-line" id="statusLabel"></div>

      <div id="scannerZone">
        <div class="scan-input-wrap">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/>
            <line x1="8" y1="12" x2="8" y2="12.01"/>
            <line x1="12" y1="12" x2="16" y2="12"/>
            <line x1="12" y1="9"  x2="12" y2="15"/>
          </svg>
          <input class="scan-input" type="text" id="barcodeInput" placeholder="Скануйте BOX або ТТН...">
        </div>

        <div class="scan-list" id="scanList"></div>

        <button id="processBtn" class="process-btn" onclick="submitData()" disabled>
          Обробити все (0)
        </button>
      </div>

      <div id="routeZone" class="hidden">
		  <input class="field" type="text" id="routeInput" maxlength="6" oninput="this.value = this.value.replace(/[^0-9]/g, '')" placeholder="Номер маршруту (5-6 цифр)">
		  <select class="field" id="employeeSelect">
			<option value="" disabled selected>Оберіть співробітника...</option>
		  </select>
        
        <button class="process-btn btn-outline" onclick="addLoader()">Додати та почати відлік</button>
        
        <div class="scan-list" id="routeList"></div>
        
        <button id="finishRouteBtn" class="process-btn btn-finish" onclick="finishRoute()" disabled>
          Закінчити маршрут
        </button>
      </div>

    </div>
  </div>

</div>

<script>
  /* ─── Config ─────────────────────────────────────────── */
  let GOOGLE_SCRIPT_URL = localStorage.getItem('api_url');
  if (!GOOGLE_SCRIPT_URL) setupApiUrl();

  function setupApiUrl() {
    const url = prompt('Введіть Web App URL:');
    if (url && url.includes('exec')) {
      localStorage.setItem('api_url', url);
      GOOGLE_SCRIPT_URL = url;
    }
  }

  function resetApiUrl() {
    localStorage.removeItem('api_url');
    location.reload();
  }

  /* ─── State ──────────────────────────────────────────── */
  let currentMode = 'Відправка';
  let currentUser = '';
  let scans = [];
  
  // Додано для Маршрутів(автоматично відновлюється з пам'яті)
  let availableEmployees = [];
  let activeRouteNum = localStorage.getItem('local_route_num') || "";
  let activeLoaders = JSON.parse(localStorage.getItem('local_loaders')) || [];

  /* ─── Print panel ────────────────────────────────────── */
  function togglePrint() {
    document.getElementById('printPanel').classList.toggle('open');
  }

  document.addEventListener('click', e => {
    const wrap = document.getElementById('printWrap');
    if (!wrap.contains(e.target)) {
      document.getElementById('printPanel').classList.remove('open');
    }
  });

  function generateAndPrintBatch() {
    const from = parseInt(document.getElementById('printFrom').value);
    const toRaw = document.getElementById('printTo').value;
    const to = toRaw ? parseInt(toRaw) : from;
    if (isNaN(from)) { alert('Введіть номер!'); return; }

    const win = window.open('', '_blank');
    win.document.write(`<!DOCTYPE html><html><head><style>
      @page { margin: 0; }
      body  { margin: 0; }
      .page { page-break-after: always; display: flex; align-items: center; justify-content: center; width: 100%; }
      svg   { width: 90%; height: auto; padding: 10px; }
    </style></head><body>`);

    const tmp = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    for (let i = from; i <= to; i++) {
      JsBarcode(tmp, 'Box-' + i, {
        format: 'CODE128', width: 3, height: 100,
        displayValue: true, fontSize: 80, fontOptions: 'bold'
      });
      win.document.write('<div class="page">' + tmp.outerHTML + '</div>');
    }
    win.document.write('<script>window.onload=()=>{window.print();window.close();}<\/script></body></html>');
    togglePrint();
  }

  /* ─── Auth ───────────────────────────────────────────── */
  async function login() {
    const user = document.getElementById('usernameInput').value.trim();
    const pass = document.getElementById('passwordInput').value.trim();
    const status = document.getElementById('loginStatus');

    if (!user || !pass) { status.innerText = 'Введіть логін та пароль'; return; }

    status.style.color = 'var(--text-2)';
    status.innerText = '⏳ Перевірка...';

    try {
      const res = await fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'login', username: user, password: pass })
      });
      const result = await res.json();

      if (result.status === 'success') {
        currentUser = result.displayName;
        availableEmployees = result.employees || [];

        // Наповнюємо список співробітників для маршрутів
        const select = document.getElementById('employeeSelect');
        select.innerHTML = '<option value="" disabled selected>Оберіть співробітника...</option>';
        availableEmployees.forEach(emp => {
          const opt = document.createElement('option');
          opt.value = emp; 
          opt.innerText = emp;
          select.appendChild(opt);
        });

        document.getElementById('loginArea').classList.add('hidden');
        document.getElementById('mainArea').classList.remove('hidden');
        
        const cityLabel = result.city ? `(${result.city})` : '';
        document.getElementById('userLabel').innerText = `${currentUser} ${cityLabel}`;
        
        const initials = currentUser.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
        document.getElementById('userAvatar').innerText = initials;
		if (activeRouteNum) {
          const routeInput = document.getElementById('routeInput');
          routeInput.value = activeRouteNum;
          routeInput.disabled = true;
        }
        renderRouteList();
        document.getElementById('barcodeInput').focus();
        clearFeedback();
      } else {
        status.style.color = 'var(--red-text)';
        status.innerText = '✕ ' + result.message;
      }
    } catch {
      status.style.color = 'var(--red-text)';
      status.innerText = '✕ Помилка з\'єднання';
    }
  }

  /* ─── Mode ───────────────────────────────────────────── */
  function setMode(mode) {
    currentMode = mode;
    document.getElementById('modeOutbound').classList.toggle('active', mode === 'Відправка');
    document.getElementById('modeInbound').classList.toggle('active', mode === 'Отримання');
    document.getElementById('modeRoute').classList.toggle('active', mode === 'Маршрути');
    
    clearFeedback();
    
    if (mode === 'Маршрути') {
      document.getElementById('scannerZone').classList.add('hidden');
      document.getElementById('routeZone').classList.remove('hidden');
    } else {
      document.getElementById('scannerZone').classList.remove('hidden');
      document.getElementById('routeZone').classList.add('hidden');
      scans = [];
      renderScans();
      document.getElementById('barcodeInput').focus();
    }
  }

  /* ─── Feedback helpers ───────────────────────────────── */
  function clearFeedback() {
    const err = document.getElementById('errorDisplay');
    err.style.display = 'none';
    err.innerHTML = '';
    const sl = document.getElementById('statusLabel');
    sl.innerText = '';
    sl.style.color = '';
  }

  function showError(lines) {
    const err = document.getElementById('errorDisplay');
    if (Array.isArray(lines)) {
      err.innerHTML = lines.map(l => '⚠ ' + l).join('<br>');
    } else {
      err.innerHTML = '⚠ ' + lines;
    }
    err.style.display = 'block';
  }

  function showStatus(text, color) {
    const sl = document.getElementById('statusLabel');
    sl.innerText = text;
    sl.style.color = color || 'var(--text-2)';
  }

  /* ─── Логіка Маршрутів (Нове) ────────────────────────── */
  function addLoader() {
    clearFeedback();
    const routeInput = document.getElementById('routeInput');
    const routeVal = routeInput.value.trim();
    const empVal = document.getElementById('employeeSelect').value;

    // Перевірка: рівно 5 або 6 цифр
    if (!/^\d{5,6}$/.test(routeVal)) return showError('Маршрут має містити від 5 до 6 цифр!');
    if (!empVal) return showError('Виберіть співробітника зі списку');
    
    // Блокуємо маршрут, якщо це перша людина
    if (!activeRouteNum) {
      activeRouteNum = routeVal;
      routeInput.disabled = true;
    } else if (activeRouteNum !== routeVal) {
      return showError('Спочатку завершіть поточний маршрут!');
    }

    if (activeLoaders.some(l => l.name === empVal)) return showError('Співробітник вже на завантаженні');

    const startStr = new Date().toLocaleTimeString('uk-UA', { hour12: false });
    activeLoaders.push({ name: empVal, start: startStr });
    
    // [Додати сюди] Фіксуємо в пам'яті на випадок вимкнення світла
    localStorage.setItem('local_route_num', activeRouteNum);
    localStorage.setItem('local_loaders', JSON.stringify(activeLoaders));
    
    // Скидаємо селект
    document.getElementById('employeeSelect').selectedIndex = 0;
    renderRouteList();
  }

 function renderRouteList() {
    const list = document.getElementById('routeList');
    list.innerHTML = '';
    activeLoaders.forEach((loader, idx) => {
      const div = document.createElement('div');
      div.className = 'scan-item';
      div.innerHTML = `
        <span class="scan-num">${idx + 1}</span>
        <span class="scan-val">${loader.name}</span>
        <span class="scan-tag tag-route">${loader.start}</span>
        <button class="finish-single-btn" onclick="finishSingleLoader(${idx})" title="Завершити для цього співробітника">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </button>
      `;
      list.appendChild(div);
    });
    
    // Головна кнопка тепер активна завжди, щоб можна було скинути порожній маршрут
    document.getElementById('finishRouteBtn').disabled = false;
    if (activeLoaders.length === 0 && !activeRouteNum) {
      document.getElementById('finishRouteBtn').innerText = "Маршрут вільний";
    } else {
      document.getElementById('finishRouteBtn').innerText = "Закінчити маршрут";
    }
  }
  // Завершення роботи ТІЛЬКИ ДЛЯ ОДНІЄЇ ЛЮДИНИ
  async function finishSingleLoader(idx) {
    clearFeedback();
    const loader = activeLoaders[idx];
    const endStr = new Date().toLocaleTimeString('uk-UA', { hour12: false });

    const finalData = [{
      route: activeRouteNum,
      name: loader.name,
      start: loader.start,
      end: endStr
    }];

    showStatus(`Завершення для ${loader.name}...`);
    try {
      const res = await fetch(GOOGLE_SCRIPT_URL, { 
        method: 'POST', 
        body: JSON.stringify({ mode: 'Маршрути', data: finalData }) 
      });
      const result = await res.json();
      
      if (result.status === 'success') {
        showStatus(`✓ ${loader.name} закінчив`, 'var(--green-text)');
        
        // Видаляємо саме цього співробітника зі списку
        activeLoaders.splice(idx, 1);
		localStorage.setItem('local_loaders', JSON.stringify(activeLoaders));
        renderRouteList();
      } else { 
        showError(result.message); 
      }
    } catch { 
      showError('Помилка з\'єднання'); 
    }
  }

  // Закриття маршруту для ВСІХ, ХТО ЗАЛИШИВСЯ (або очищення)
  async function finishRoute() {
    clearFeedback();
    
    if (activeLoaders.length === 0) {
      // Якщо людей більше немає, просто скидаємо блокування поля для нового маршруту
      activeRouteNum = "";
	  localStorage.removeItem('local_route_num');
      localStorage.removeItem('local_loaders');
      const routeInput = document.getElementById('routeInput');
      routeInput.disabled = false;
      routeInput.value = "";
      showStatus('✓ Поле маршруту розблоковано', 'var(--text-2)');
      renderRouteList();
      return;
    }

    const endStr = new Date().toLocaleTimeString('uk-UA', { hour12: false });
    
    const finalData = activeLoaders.map(l => ({
      route: activeRouteNum,
      name: l.name,
      start: l.start,
      end: endStr
    }));

    showStatus('Закриття маршруту для всіх...');
    try {
      const res = await fetch(GOOGLE_SCRIPT_URL, { 
        method: 'POST', 
        body: JSON.stringify({ mode: 'Маршрути', data: finalData }) 
      });
      const result = await res.json();
      
      if (result.status === 'success') {
        showStatus('✓ Маршрут закрито', 'var(--green-text)');
        activeLoaders = [];
        activeRouteNum = "";
        localStorage.removeItem('local_route_num');
        localStorage.removeItem('local_loaders');
        const routeInput = document.getElementById('routeInput');
        routeInput.disabled = false;
        routeInput.value = "";
        
        renderRouteList();
      } else { 
        showError(result.message); 
      }
    } catch { 
      showError('Помилка з\'єднання'); 
    }
  }

  /* ─── Scanning ───────────────────────────────────────── */
  function handleScan() {
    const input = document.getElementById('barcodeInput');
    const val = input.value.replace(/%/g, '').trim().toUpperCase();
    if (!val) return;

    const isBox = val.startsWith('BOX');

    if (currentMode === 'Отримання' && !isBox) {
      alert("В режимі 'Отримання' скануйте тільки BOX!");
      input.value = '';
      return;
    }

    const isDuplicate = scans.some(s => s.value === val);
    scans.push({ value: val, isBox, duplicate: isDuplicate });
    input.value = '';
    input.focus();
    renderScans();
  }

  function renderScans() {
    const list = document.getElementById('scanList');
    list.innerHTML = '';

    [...scans].reverse().forEach((item, revIdx) => {
      const realIdx = scans.length - revIdx;
      const div = document.createElement('div');
      div.className = 'scan-item' + (item.duplicate ? ' dup' : '');

      const tagClass = item.duplicate
        ? 'scan-tag tag-dup'
        : (item.isBox ? 'scan-tag tag-box' : 'scan-tag tag-ttn');
      const tagLabel = item.duplicate ? 'ДУБ' : (item.isBox ? 'BOX' : 'ТТН');

      div.innerHTML = `
        <span class="scan-num">${realIdx}</span>
        <span class="scan-val">${item.value}</span>
        <span class="${tagClass}">${tagLabel}</span>
        <button class="del-btn" onclick="deleteScan(${scans.length - 1 - revIdx})" title="Видалити">×</button>
      `;
      list.appendChild(div);
    });

    const btn = document.getElementById('processBtn');
    btn.disabled = scans.length === 0;
    btn.innerText = `Обробити все (${scans.length})`;
  }

  function deleteScan(idx) {
    scans.splice(idx, 1);
    scans = scans.map((s, i) => {
      s.duplicate = scans.slice(0, i).some(p => p.value === s.value);
      return s;
    });
    renderScans();
  }

  /* ─── Submit (Відправка/Отримання) ───────────────────── */
  async function submitData() {
    clearFeedback();
    let finalData = [];
    let errors = [];

    if (currentMode === 'Відправка') {
      for (let i = 0; i < scans.length; i++) {
        if (scans[i].isBox) {
          const next = scans[i + 1];
          if (next && !next.isBox) {
            finalData.push({ box: scans[i].value, ttn: next.value, user: currentUser });
            i++;
          } else {
            errors.push(`BOX ${scans[i].value} — без ТТН`);
          }
        } else {
          errors.push(`ТТН ${scans[i].value} — без BOX`);
        }
      }
    } else {
      finalData = scans.filter(s => s.isBox).map(s => ({ box: s.value, user: currentUser }));
    }

    if (scans.some(s => s.duplicate)) errors.push('Видаліть дублікати перед відправкою');

    if (errors.length > 0) { showError(errors); return; }

    showStatus('Надсилання...');

    try {
      const res = await fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ mode: currentMode, data: finalData })
      });
      const result = await res.json();

      if (result.status === 'success') {
        showStatus('✓ Успішно збережено', 'var(--green-text)');
        scans = [];
        renderScans();
      } else {
        alert(result.message);
        showStatus('');
      }
    } catch {
      showStatus('✕ Помилка з\'єднання', 'var(--red-text)');
    }
  }

  /* ─── Keyboard ───────────────────────────────────────── */
  document.getElementById('barcodeInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') handleScan();
  });

  document.getElementById('passwordInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
