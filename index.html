<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скан Термінал 📦</title>
    <style>
        :root { --main-blue: #0056b3; --error-red: #dc3545; }
        body { font-family: sans-serif; background-color: #f0f4f8; padding: 10px; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        
        h1 { text-align: center; font-size: 1.8rem; color: var(--main-blue); margin-top: 0; margin-bottom: 20px; }
        
        /* Секція конфігурації (перший запуск) */
        #configArea { background: #fffbe6; border: 2px dashed #ffe58f; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: none; }
        #configArea p { margin-top: 0; font-weight: bold; color: #856404; }

        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex-grow: 1; padding: 15px; border: 2px solid #ccc; border-radius: 8px; font-size: 20px; outline: none; width: 100%; box-sizing: border-box; }
        input:focus { border-color: var(--main-blue); }
        
        button { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-blue { background: var(--main-blue); color: white; width: 100%; }
        .btn-green { background: #28a745; color: white; width: 100%; margin-top: 15px; font-size: 20px; }
        .btn-green:disabled { background: #ccc; cursor: not-allowed; }

        /* Елементи списку */
        .scan-list { margin-top: 15px; border-top: 2px solid #eee; max-height: 450px; overflow-y: auto; }
        .scan-item { display: flex; align-items: center; padding: 12px 5px; border-bottom: 2px solid #f0f0f0; font-size: 1.3rem; }
        .scan-index { width: 45px; color: #888; font-weight: bold; flex-shrink: 0; }
        .scan-info { flex-grow: 1; display: flex; justify-content: space-between; margin-right: 15px; font-family: monospace; }
        
        /* Великий хрестик видалення */
        .delete-btn { 
            color: var(--error-red); 
            background: #fff1f0; 
            border: 2px solid #ffa39e; 
            padding: 5px 15px; 
            cursor: pointer; 
            font-size: 30px; 
            border-radius: 8px; 
            line-height: 1; 
            font-weight: bold;
        }

        #errorDisplay { display: none; color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-size: 1.1rem; line-height: 1.4; }
        .status-msg { text-align: center; font-weight: bold; margin: 10px 0; font-size: 1.1rem; min-height: 24px; }
        #counterLabel { text-align: right; color: #666; font-weight: bold; margin-bottom: 5px; font-size: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Скан Термінал 🟦📦</h1>

    <div id="configArea">
        <p>⚠️ Система не налаштована.</p>
        <input type="password" id="apiUrlInput" placeholder="Вставте URL вашого скрипта...">
        <button class="btn-blue" style="margin-top:12px" onclick="saveConfig()">ПІДКЛЮЧИТИ БАЗУ</button>
    </div>

    <div id="loginArea" style="display:none">
        <div class="input-row" style="flex-direction: column;">
            <input type="text" id="usernameInput" placeholder="Логін">
            <input type="password" id="passwordInput" placeholder="Пароль" style="margin-top: 10px;">
            <button class="btn-blue" style="margin-top: 15px;" onclick="login()">УВІЙТИ</button>
        </div>
        <div id="loginStatus" style="text-align: center; color: red; margin-top: 10px; font-weight: bold;"></div>
    </div>

    <div id="mainArea" style="display:none;">
        <div id="modeSelector" class="input-row" style="background: #eee; padding: 5px; border-radius: 10px; margin-bottom:20px;">
            <button id="modeOutbound" style="flex:1; background: white; color: var(--main-blue);" onclick="setMode('Відправка')">ВІДПРАВКА</button>
            <button id="modeInbound" style="flex:1; background: transparent;" onclick="setMode('Отримання')">ОТРИМАННЯ</button>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span id="userLabel" style="font-size: 1.2rem; font-weight: bold;">📦</span>
            <button onclick="clearAllData()" style="padding: 8px 15px; background: #6c757d; font-size: 14px; color: white;">Вийти / Скинути</button>
        </div>

        <div class="input-row">
            <input type="text" id="barcodeInput" placeholder="Скануйте...">
            <button class="btn-blue" style="width: 70px;" onclick="handleScan()">+</button>
        </div>
        
        <div id="counterLabel">Всього: 0</div>
        <div id="errorDisplay"></div>
        <div id="statusLabel" class="status-msg"></div>

        <div class="scan-list" id="scanList"></div>
        
        <button id="processBtn" class="btn-green" onclick="submitData()" disabled>ОБРОБИТИ ВСЕ</button>
    </div>
</div>

<script>
    // Спробуємо дістати URL з постійної пам'яті браузера
    let GOOGLE_SCRIPT_URL = localStorage.getItem('api_url') || "";
    let scans = [];
    let currentMode = 'Відправка';
    let currentUser = "";

    // Ініціалізація при завантаженні
    window.onload = () => {
        if (!GOOGLE_SCRIPT_URL) {
            document.getElementById('configArea').style.display = 'block';
        } else {
            document.getElementById('loginArea').style.display = 'block';
        }
    };

    // Збереження посилання один раз
    function saveConfig() {
        const url = document.getElementById('apiUrlInput').value.trim();
        if (url.startsWith('https://script.google.com')) {
            localStorage.setItem('api_url', url);
            location.reload();
        } else {
            alert("Помилка! Введіть коректне посилання на Google Apps Script.");
        }
    }

    // Очищення налаштувань (Вихід)
    function clearAllData() {
        if(confirm("Вийти з акаунту та скинути налаштування?")) {
            localStorage.removeItem('api_url');
            location.reload();
        }
    }

    // Авторизація
    async function login() {
        const user = document.getElementById('usernameInput').value.trim();
        const pass = document.getElementById('passwordInput').value.trim();
        const status = document.getElementById('loginStatus');

        if (!user || !pass) return;
        status.innerText = "⏳ Перевірка...";

        try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "login", username: user, password: pass })
            });
            const result = await response.json();

            if (result.status === "success") {
                currentUser = result.displayName;
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('mainArea').style.display = 'block';
                document.getElementById('userLabel').innerText = "📦 " + currentUser;
                document.getElementById('barcodeInput').focus();
            } else {
                status.innerText = "❌ Невірний логін або пароль";
            }
        } catch (e) {
            status.innerText = "❌ Помилка з'єднання з базою";
        }
    }

    // Вибір режиму
    function setMode(mode) {
        currentMode = mode;
        document.getElementById('modeOutbound').style.background = mode === 'Відправка' ? 'white' : 'transparent';
        document.getElementById('modeOutbound').style.color = mode === 'Відправка' ? '#0056b3' : 'black';
        document.getElementById('modeInbound').style.background = mode === 'Отримання' ? 'white' : 'transparent';
        document.getElementById('modeInbound').style.color = mode === 'Отримання' ? '#0056b3' : 'black';
        document.getElementById('barcodeInput').focus();
        updateUI();
    }

    // Обробка Enter
    document.getElementById('barcodeInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); handleScan(); }
    });

    function handleScan() {
        const input = document.getElementById('barcodeInput');
        const val = input.value.trim();
        if (!val) return;

        const type = val.toUpperCase().startsWith("BOX") ? "BOX" : "TTN";
        scans.push({ value: val, type: type });
        
        input.value = "";
        input.focus();
        updateUI();
    }

    function updateUI() {
        const list = document.getElementById('scanList');
        document.getElementById('counterLabel').innerText = "Всього: " + scans.length;
        list.innerHTML = "";
        
        scans.slice().reverse().forEach((item, revIndex) => {
            const idx = scans.length - 1 - revIndex;
            const div = document.createElement('div');
            div.className = 'scan-item';
            div.innerHTML = `
                <span class="scan-index">${idx + 1}.</span>
                <div class="scan-info">
                    <span>${item.value}</span>
                    <b style="color: ${item.type === 'BOX' ? '#0056b3' : '#666'}">${item.type}</b>
                </div>
                <button class="delete-btn" onclick="deleteScan(${idx})">&times;</button>
            `;
            list.appendChild(div);
        });
        document.getElementById('processBtn').disabled = scans.length === 0;
    }

    function deleteScan(idx) {
        scans.splice(idx, 1);
        updateUI();
        document.getElementById('errorDisplay').style.display = 'none';
        document.getElementById('barcodeInput').focus();
    }

    // Відправка
    async function submitData() {
        const status = document.getElementById('statusLabel');
        const errBox = document.getElementById('errorDisplay');
        errBox.style.display = 'none';
        errBox.innerHTML = "";

        let errors = [];
        let processedData = [];

        for (let i = 0; i < scans.length; i++) {
            let item = scans[i];
            let scanNum = i + 1;

            if (currentMode === "Відправка") {
                if (item.type === "BOX") {
                    let next = scans[i+1];
                    if (!next || next.type === "BOX") {
                        errors.push(`❗ Скан №${scanNum}: ${item.value} не має ТТН`);
                    } else {
                        processedData.push({ box: item.value, ttn: next.value, user: currentUser });
                        i++; 
                    }
                } else { errors.push(`❗ Скан №${scanNum}: ТТН ${item.value} без BOX`); }
            } else {
                if (item.type === "BOX") {
                    processedData.push({ box: item.value, ttn: "Прийнято", user: currentUser });
                }
            }
        }

        if (errors.length > 0) {
            errBox.innerHTML = "<b>Помилки обробки:</b><br>" + errors.join("<br>");
            errBox.style.display = 'block';
            status.innerText = "❌ Виправте помилки";
            return;
        }

        status.innerText = "⏳ Відправка...";
        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ mode: currentMode, data: processedData })
            });
            status.innerText = "✅ Успішно надіслано!";
            scans = [];
            updateUI();
        } catch (e) { 
            alert("Помилка мережі!"); 
            status.innerText = "";
        }
    }
</script>
</body>
</html>
