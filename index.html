<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скан Термінал 📦 (Secure)</title>
    <style>
        :root { --main-blue: #0056b3; --error-red: #dc3545; }
        body { font-family: sans-serif; background-color: #f0f4f8; padding: 10px; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h1 { text-align: center; font-size: 1.8rem; color: var(--main-blue); margin-top: 0; margin-bottom: 20px; }
        
        /* Секція Майстер-пароля */
        #configArea { background: #e6f7ff; border: 2px dashed #91d5ff; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: none; text-align: center; }
        
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex-grow: 1; padding: 15px; border: 2px solid #ccc; border-radius: 8px; font-size: 20px; outline: none; width: 100%; box-sizing: border-box; }
        input:focus { border-color: var(--main-blue); }
        
        button { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-blue { background: var(--main-blue); color: white; width: 100%; }
        .btn-green { background: #28a745; color: white; width: 100%; margin-top: 15px; font-size: 20px; }
        .btn-green:disabled { background: #ccc; cursor: not-allowed; }

        .scan-list { margin-top: 15px; border-top: 2px solid #eee; max-height: 400px; overflow-y: auto; }
        .scan-item { display: flex; align-items: center; padding: 12px 5px; border-bottom: 2px solid #f0f0f0; font-size: 1.3rem; }
        .scan-index { width: 40px; color: #888; font-weight: bold; }
        .scan-info { flex-grow: 1; display: flex; justify-content: space-between; margin-right: 15px; font-family: monospace; }
        .delete-btn { color: var(--error-red); background: #fff1f0; border: 2px solid #ffa39e; padding: 5px 15px; cursor: pointer; font-size: 25px; border-radius: 8px; }

        #errorDisplay { display: none; color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .status-msg { text-align: center; font-weight: bold; margin: 10px 0; min-height: 24px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Скан Термінал 🟦📦</h1>

    <div id="configArea">
        <p><b>🔑 Введіть ключ доступу до системи</b></p>
        <input type="password" id="masterKeyInput" placeholder="Master Key">
        <button class="btn-blue" style="margin-top:12px" onclick="saveMasterKey()">УВІЙТИ В СИСТЕМУ</button>
    </div>

    <div id="loginArea" style="display:none">
        <div class="input-row" style="flex-direction: column;">
            <input type="text" id="usernameInput" placeholder="Логін">
            <input type="password" id="passwordInput" placeholder="Пароль" style="margin-top: 10px;">
            <button class="btn-blue" style="margin-top: 15px;" onclick="login()">УВІЙТИ</button>
        </div>
        <div id="loginStatus" class="status-msg" style="color: red;"></div>
    </div>

    <div id="mainArea" style="display:none;">
        <div id="modeSelector" class="input-row" style="background: #eee; padding: 5px; border-radius: 10px; margin-bottom:20px;">
            <button id="modeOutbound" style="flex:1; background: white; color: var(--main-blue);" onclick="setMode('Відправка')">ВІДПРАВКА</button>
            <button id="modeInbound" style="flex:1; background: transparent;" onclick="setMode('Отримання')">ОТРИМАННЯ</button>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span id="userLabel" style="font-size: 1.1rem; font-weight: bold;">📦</span>
            <button onclick="logout()" style="padding: 8px 12px; background: #6c757d; font-size: 12px; color: white; border-radius: 5px;">Скинути все</button>
        </div>

        <div class="input-row">
            <input type="text" id="barcodeInput" placeholder="Скануйте...">
            <button class="btn-blue" style="width: 70px;" onclick="handleScan()">+</button>
        </div>
        
        <div id="counterLabel" style="text-align: right; font-weight: bold; color: #666;">Всього: 0</div>
        <div id="errorDisplay"></div>
        <div id="statusLabel" class="status-msg"></div>

        <div class="scan-list" id="scanList"></div>
        <button id="processBtn" class="btn-green" onclick="submitData()" disabled>ОБРОБИТИ ВСЕ</button>
    </div>
</div>

<script>
    // ВСТАВТЕ СЮДИ URL ВАШОГО СКРИПТА-ШЛЮЗА (№1)
    // Розбиваємо URL, щоб боти не бачили цілий рядок
    const _p1 = "https://script.google.com/";
    const _p2 = "macros/s/AKfycbyQDS5OHQe9iBEdYd1sDF9rfv6IzTdBcldc0xQeSbd1-2xnmxUy5n_MyThJTsCUh_J5aw";
    const _p3 = "/exec";

    const GATEWAY_URL = _p1 + _p2 + _p3;
    let scans = [];
    let currentMode = 'Відправка';
    let currentUser = "";
    let masterKey = localStorage.getItem('master_key') || "";

    window.onload = () => {
        if (!masterKey) {
            document.getElementById('configArea').style.display = 'block';
        } else {
            showLogin();
        }
    };

    function saveMasterKey() {
        const val = document.getElementById('masterKeyInput').value.trim();
        if (val) {
            masterKey = val;
            localStorage.setItem('master_key', val);
            showLogin();
        }
    }

    function showLogin() {
        document.getElementById('configArea').style.display = 'none';
        document.getElementById('loginArea').style.display = 'block';
    }

    function logout() {
        if(confirm("Очистити ключ доступу та вийти?")) {
            localStorage.clear();
            location.reload();
        }
    }

    // Універсальна функція запиту до Шлюзу
 async function apiRequest(payload) {
    payload.masterKey = masterKey; 
    
    const finalUrl = `${GATEWAY_URL}?data=${encodeURIComponent(JSON.stringify(payload))}`;

    try {
        const response = await fetch(finalUrl, {
            method: 'GET', // Тільки GET для локальних тестів та GAS
            mode: 'cors'
            // Приберіть headers взагалі, для GET вони не потрібні
        });
        
        if (!response.ok) throw new Error('Мережева помилка');
        
        return await response.json();
    } catch (e) {
        console.error("Fetch error:", e);
        throw e;
    }
}

    async function login() {
        const user = document.getElementById('usernameInput').value.trim();
        const pass = document.getElementById('passwordInput').value.trim();
        const status = document.getElementById('loginStatus');

        if (!user || !pass) return;
        status.innerText = "⏳ Перевірка ключа та логіна...";

        try {
            const result = await apiRequest({ action: "login", username: user, password: pass });

            if (result.status === "success") {
                currentUser = result.displayName;
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('mainArea').style.display = 'block';
                document.getElementById('userLabel').innerText = "👤 " + currentUser;
                document.getElementById('barcodeInput').focus();
            } else {
                status.innerText = "❌ " + (result.message || "Помилка входу");
            }
        } catch (e) {
            status.innerText = "❌ Помилка з'єднання зі шлюзом";
        }
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('modeOutbound').style.background = mode === 'Відправка' ? 'white' : 'transparent';
        document.getElementById('modeInbound').style.background = mode === 'Отримання' ? 'white' : 'transparent';
        document.getElementById('barcodeInput').focus();
        updateUI();
    }

    document.getElementById('barcodeInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); handleScan(); }
    });

    function handleScan() {
        const input = document.getElementById('barcodeInput');
        const val = input.value.trim();
        if (!val) return;

        const type = val.toUpperCase().startsWith("BOX") ? "BOX" : "TTN";
        scans.push({ value: val, type: type });
        input.value = "";
        input.focus();
        updateUI();
    }

    function updateUI() {
        const list = document.getElementById('scanList');
        document.getElementById('counterLabel').innerText = "Всього: " + scans.length;
        list.innerHTML = "";
        
        scans.slice().reverse().forEach((item, revIndex) => {
            const idx = scans.length - 1 - revIndex;
            const div = document.createElement('div');
            div.className = 'scan-item';
            div.innerHTML = `
                <span class="scan-index">${idx + 1}.</span>
                <div class="scan-info">
                    <span>${item.value}</span>
                    <b style="color: ${item.type === 'BOX' ? '#0056b3' : '#666'}">${item.type}</b>
                </div>
                <button class="delete-btn" onclick="deleteScan(${idx})">&times;</button>
            `;
            list.appendChild(div);
        });
        document.getElementById('processBtn').disabled = scans.length === 0;
    }

    function deleteScan(idx) {
        scans.splice(idx, 1);
        updateUI();
    }

    async function submitData() {
        const status = document.getElementById('statusLabel');
        const errBox = document.getElementById('errorDisplay');
        errBox.style.display = 'none';

        let processedData = [];
        let errors = [];

        // Логіка групування BOX + TTN
        for (let i = 0; i < scans.length; i++) {
            if (currentMode === "Відправка") {
                if (scans[i].type === "BOX") {
                    if (scans[i+1] && scans[i+1].type === "TTN") {
                        processedData.push({ box: scans[i].value, ttn: scans[i+1].value, user: currentUser });
                        i++; 
                    } else { errors.push(`❗ Box ${scans[i].value} без ТТН`); }
                } else { errors.push(`❗ ТТН ${scans[i].value} без Box`); }
            } else {
                if (scans[i].type === "BOX") {
                    processedData.push({ box: scans[i].value, user: currentUser });
                }
            }
        }

        if (errors.length > 0) {
            errBox.innerHTML = errors.join("<br>");
            errBox.style.display = 'block';
            return;
        }

        status.innerText = "⏳ Відправка через шлюз...";
        try {
            const result = await apiRequest({ mode: currentMode, data: processedData });
            if (result.status === "success") {
                status.innerText = "✅ Дані збережено!";
                scans = [];
                updateUI();
            } else {
                status.innerText = "❌ Помилка: " + result.message;
            }
        } catch (e) {
            status.innerText = "❌ Помилка мережі";
        }
    }
</script>
</body>
</html>
